name: Scrape Gym Schedule

on:
  schedule:
    # 7:00 Warsaw time (UTC+2 summer, UTC+1 winter) — runs at 5:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and Chromium
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch rendered gym page
        id: fetch
        run: node scripts/fetch-gym-page.mjs
        continue-on-error: true

      - name: Send to Vercel scraper
        run: |
          HTTP_CODE="${{ steps.fetch.outputs.http_code }}"
          if [ "$HTTP_CODE" = "200" ] && [ -f /tmp/gym-text.txt ]; then
            echo "Page rendered OK — posting text to scraper"
            curl -s -f -X POST \
              '${{ vars.VERCEL_APP_URL }}/api/cron/scrape' \
              -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}' \
              -H 'Content-Type: application/json' \
              -d "{\"text\": $(jq -Rs '.' /tmp/gym-text.txt)}"
          else
            echo "Fetch failed ($HTTP_CODE) — calling scraper without body (will log site unavailable)"
            curl -s -f \
              '${{ vars.VERCEL_APP_URL }}/api/cron/scrape' \
              -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}'
          fi
