name: Scrape Gym Schedule

on:
  schedule:
    # 7:00 Warsaw time (UTC+2 summer, UTC+1 winter) — runs at 5:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and Chromium
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch rendered gym page
        id: fetch
        run: node scripts/fetch-gym-page.mjs
        continue-on-error: true

      - name: Send to Vercel scraper
        run: |
          HTTP_CODE="${{ steps.fetch.outputs.http_code }}"
          echo "=== Playwright fetch result: HTTP_CODE=$HTTP_CODE ==="
          echo "=== gym-text.txt exists: $([ -f /tmp/gym-text.txt ] && echo YES || echo NO) ==="
          [ -f /tmp/gym-text.txt ] && echo "=== Text length: $(wc -c < /tmp/gym-text.txt) bytes ===" || true

          if [ "$HTTP_CODE" = "200" ] && [ -f /tmp/gym-text.txt ]; then
            echo "=== Sending rendered text to Vercel ==="
            HTTP_STATUS=$(curl -s -o /tmp/vercel-response.json -w "%{http_code}" -X POST \
              '${{ vars.VERCEL_APP_URL }}/api/cron/scrape' \
              -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}' \
              -H 'Content-Type: application/json' \
              -d "{\"text\": $(jq -Rs '.' /tmp/gym-text.txt)}")
          else
            echo "=== Playwright blocked — triggering Vercel scraper directly (will use Jina Reader) ==="
            HTTP_STATUS=$(curl -s -o /tmp/vercel-response.json -w "%{http_code}" \
              '${{ vars.VERCEL_APP_URL }}/api/cron/scrape' \
              -H 'Authorization: Bearer ${{ secrets.CRON_SECRET }}')
          fi

          echo "=== Vercel response status: $HTTP_STATUS ==="
          echo "=== Vercel response body: ==="
          cat /tmp/vercel-response.json

          [ "$HTTP_STATUS" = "200" ] || exit 1
